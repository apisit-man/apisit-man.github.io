<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Science Sort Sprint - Middle School Edition</title>
<!-- Google Fonts -->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&family=Prompt:wght@400;600;700;800&display=swap" rel="stylesheet">
<!-- Game CSS -->
<link rel="stylesheet" href="game.css">
</head>
<body>
<!-- Decorative Blobs -->
<div class="blob blob-1"></div>
<div class="blob blob-2"></div>

<div class="top-bar">
  <a href="../../index.html" class="back-link">
    <svg width="18" height="18" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M15 19l-7-7 7-7"></path></svg>
    กลับหน้าแรก
  </a>
  <button id="themeToggle" class="theme-toggle" title="สลับโหมดสี">🌓 ธีม</button>
</div>

<div class="wrap">
  <header>
    <h1>Science Sort <span class="subtitle">แยกประเภทวิทย์ (ม.ต้น)</span></h1>
    <div class="stats">
      <div class="stat-box"><div class="label">คะแนน</div><div class="value" id="score">0</div></div>
      <div class="stat-box"><div class="label">สูงสุด</div><div class="value" id="best">0</div></div>
    </div>
  </header>

  <div class="subrow">
    <div>ด่าน <span id="level">1</span> &nbsp;·&nbsp; <span class="lives" id="lives">❤️❤️❤️</span></div>
    <button class="secondary-btn" id="quitGameBtn" style="display:none; padding: 6px 12px; font-size: 12px;">เลิกเล่น</button>
  </div>

  <div class="lane" id="lane">
    <!-- Start Menu Overlay -->
    <div class="overlay show" id="startMenuOverlay">
      <div class="msg">🧪 Science Sort</div>
      <div class="sub">
        <ul style="text-align:left; font-size:13px; margin: 0; padding-left: 20px;">
          <li>แยกความรู้วิทย์ลงหมวดให้ถูกก่อนตกถึงพื้น!</li>
          <li>🌟 <b>การ์ดโบนัส:</b> คะแนนคูณสอง</li>
          <li>❄️ <b>การ์ดแช่แข็ง:</b> ช่วยหน่วงเวลา</li>
          <li>⚠️ <b>การ์ดหลอก (TRICK):</b> ห้ามกดเด็ดขาด! ปล่อยทิ้งเลย</li>
        </ul>
      </div>
      <button class="primary-btn" id="startMenuBtn">เริ่มเล่นเลย!</button>
    </div>

    <!-- Game Over Overlay -->
    <div class="overlay" id="gameOverOverlay">
      <div class="msg" id="overlayMsg">จบเกม</div>
      <div class="sub" id="overlaySub"></div>
      
      <!-- Review Section -->
      <div id="reviewSection" style="display:none; width:100%; margin-top:10px;">
        <div style="font-size:13px; font-weight:800; color:var(--danger); margin-bottom:4px;">❌ ข้อที่ตอบผิด / พลาด:</div>
        <div class="review-box" id="reviewList">
            <!-- Injected by game.js -->
        </div>
      </div>

      <button class="primary-btn" id="tryAgainBtn">เล่นอีกครั้ง</button>
    </div>
  </div>

  <div class="buttons">
    <button class="cat-btn physics" data-cat="ฟิสิกส์">⚛️ ฟิสิกส์</button>
    <button class="cat-btn chemistry" data-cat="เคมี">🧫 เคมี</button>
    <button class="cat-btn biology" data-cat="ชีววิทยา">🧬 ชีววิทยา</button>
    <button class="cat-btn earth" data-cat="โลกและอวกาศ">🌍 โลกและอวกาศ</button>
  </div>
</div>

<!-- Scripts -->
<script src="data.js"></script>
<script src="audio.js"></script>
<script src="game.js"></script>
</body>
</html>
