<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Science Sort Sprint</title>
<!-- Google Fonts to match portfolio -->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&family=Prompt:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
  :root {
    --brand-50: #f5f3ff;
    --brand-100: #ede9fe;
    --brand-500: #8b5cf6;
    --brand-600: #7c3aed;
    
    --slate-50: #f8fafc;
    --slate-100: #f1f5f9;
    --slate-800: #1e293b;
    --slate-900: #0f172a;
    
    --bg: linear-gradient(135deg, var(--brand-50) 0%, var(--slate-100) 100%);
    --panel: rgba(255, 255, 255, 0.85);
    --ink: var(--slate-800);
    --muted: #64748b;
    
    --physics: linear-gradient(135deg, #3b82f6, #2563eb);
    --chemistry: linear-gradient(135deg, #f59e0b, #d97706);
    --biology: linear-gradient(135deg, #10b981, #059669);
    --earth: linear-gradient(135deg, #8b5cf6, #6d28d9);
    --danger: #ef4444;
  }
  
  * { box-sizing: border-box; }
  
  body {
    margin: 0;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    background: var(--bg);
    font-family: 'Plus Jakarta Sans', 'Prompt', sans-serif;
    color: var(--ink);
    padding: 16px;
    overflow: hidden;
  }
  
  .wrap { 
    width: 100%; 
    max-width: 480px; 
    position: relative;
    z-index: 1;
  }

  /* Decorative background blobs */
  .blob {
    position: absolute;
    border-radius: 50%;
    filter: blur(60px);
    z-index: -1;
    opacity: 0.5;
  }
  .blob-1 {
    width: 300px; height: 300px;
    background: var(--brand-100);
    top: -100px; left: -100px;
  }
  .blob-2 {
    width: 250px; height: 250px;
    background: #e0e7ff;
    bottom: -50px; right: -50px;
  }

  header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 12px;
  }
  
  h1 { 
    font-size: 24px; 
    font-weight: 800;
    margin: 0; 
    background: linear-gradient(to right, var(--brand-600), #4f46e5);
    -webkit-background-clip: text;
    color: transparent;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  
  .stats { display: flex; gap: 10px; }
  
  .stat-box {
    background: #fff;
    border-radius: 12px;
    padding: 8px 16px;
    text-align: center;
    min-width: 64px;
    box-shadow: 0 4px 6px -1px rgba(0,0,0,0.05), 0 2px 4px -1px rgba(0,0,0,0.03);
    border: 1px solid rgba(255,255,255,0.4);
  }
  .stat-box .label { font-size: 11px; text-transform: uppercase; color: var(--muted); font-weight: 700; letter-spacing: 0.5px; }
  .stat-box .value { font-size: 20px; font-weight: 800; color: var(--brand-600); }

  .subrow {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 16px;
    font-size: 14px;
    font-weight: 600;
    color: var(--muted);
  }
  .lives { display: flex; gap: 4px; font-size: 20px; }
  .lives span.lost { opacity: 0.2; filter: grayscale(1); }

  button#newGame {
    background: var(--slate-900);
    color: #fff;
    border: none;
    border-radius: 8px;
    padding: 8px 16px;
    font-size: 14px;
    font-weight: 700;
    font-family: inherit;
    cursor: pointer;
    box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1);
    transition: all 0.2s ease;
  }
  button#newGame:hover { transform: translateY(-1px); box-shadow: 0 6px 8px -1px rgba(0,0,0,0.15); }
  button#newGame:active { transform: translateY(1px); }

  .lane {
    position: relative;
    background: var(--panel);
    backdrop-filter: blur(10px);
    border-radius: 16px;
    height: 380px;
    overflow: hidden;
    box-shadow: 0 10px 25px -5px rgba(0,0,0,0.05), inset 0 2px 4px rgba(255,255,255,0.5);
    border: 2px dashed #cbd5e1;
    transition: all 0.3s ease;
  }
  
  .lane.shake {
    animation: shake 0.4s cubic-bezier(.36,.07,.19,.97) both;
    border-color: var(--danger);
    background: #fef2f2;
  }
  
  @keyframes shake {
    10%, 90% { transform: translate3d(-1px, 0, 0); }
    20%, 80% { transform: translate3d(2px, 0, 0); }
    30%, 50%, 70% { transform: translate3d(-4px, 0, 0); }
    40%, 60% { transform: translate3d(4px, 0, 0); }
  }

  .card {
    position: absolute;
    left: 8%;
    width: 84%;
    top: -120px;
    background: #ffffff;
    border: 2px solid #e2e8f0;
    border-radius: 12px;
    padding: 20px 16px;
    font-size: 16px;
    line-height: 1.4;
    font-weight: 600;
    text-align: center;
    box-shadow: 0 10px 15px -3px rgba(0,0,0,0.1), 0 4px 6px -2px rgba(0,0,0,0.05);
    will-change: top, transform;
    animation: popIn 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
  }
  
  @keyframes popIn {
    0% { transform: scale(0.8) translateY(-20px); opacity: 0; }
    100% { transform: scale(1) translateY(0); opacity: 1; }
  }
  
  .card.correct { 
    border-color: #10b981; 
    background: #ecfdf5; 
    color: #065f46;
  }
  .card.wrong { 
    border-color: var(--danger); 
    background: #fef2f2; 
    color: #991b1b;
  }
  
  .card.correct-anim {
    animation: floatUp 0.6s cubic-bezier(0.165, 0.84, 0.44, 1) forwards;
  }
  
  @keyframes floatUp {
    0% { transform: scale(1); opacity: 1; }
    100% { transform: scale(1.1) translateY(-40px); opacity: 0; }
  }

  .floating-score {
    position: absolute;
    font-weight: 800;
    font-size: 24px;
    color: var(--brand-600);
    pointer-events: none;
    animation: floatUpScore 0.8s ease-out forwards;
    text-shadow: 0 2px 8px rgba(255,255,255,0.8);
    z-index: 10;
  }
  @keyframes floatUpScore {
    0% { transform: translate(-50%, 0) scale(0.8); opacity: 0; }
    20% { transform: translate(-50%, -10px) scale(1.1); opacity: 1; }
    100% { transform: translate(-50%, -50px) scale(1); opacity: 0; }
  }

  .buttons {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 12px;
    margin-top: 16px;
  }
  
  .cat-btn {
    border: none;
    border-radius: 12px;
    padding: 16px 8px;
    color: #fff;
    font-family: inherit;
    font-weight: 700;
    font-size: 15px;
    cursor: pointer;
    box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1), inset 0 1px 0 rgba(255,255,255,0.2);
    transition: all 0.15s cubic-bezier(0.4, 0, 0.2, 1);
    position: relative;
    overflow: hidden;
  }
  .cat-btn::after {
    content: '';
    position: absolute;
    top: 0; left: 0; width: 100%; height: 100%;
    background: linear-gradient(to bottom, rgba(255,255,255,0.1), rgba(255,255,255,0));
    pointer-events: none;
  }
  .cat-btn:active { transform: scale(0.96) translateY(2px); box-shadow: 0 1px 2px rgba(0,0,0,0.1); }
  .cat-btn.physics   { background: var(--physics); }
  .cat-btn.chemistry { background: var(--chemistry); }
  .cat-btn.biology   { background: var(--biology); }
  .cat-btn.earth     { background: var(--earth); }
  .cat-btn:disabled  { filter: grayscale(0.6); opacity: 0.7; cursor: not-allowed; transform: none; box-shadow: none; }

  .overlay {
    position: absolute;
    inset: 0;
    background: rgba(255,255,255,0.85);
    backdrop-filter: blur(8px);
    display: none;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 12px;
    text-align: center;
    padding: 24px;
    z-index: 20;
    animation: fadeIn 0.3s ease;
  }
  @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
  
  .overlay.show { display: flex; }
  .overlay .msg { font-size: 32px; font-weight: 800; color: var(--slate-900); }
  .overlay .sub { font-size: 16px; color: var(--muted); font-weight: 600; margin-bottom: 10px; }
  .overlay button {
    background: linear-gradient(135deg, var(--brand-500), var(--brand-600));
    color: #fff;
    border: none;
    border-radius: 8px;
    padding: 12px 24px;
    font-size: 16px;
    font-weight: 800;
    font-family: inherit;
    cursor: pointer;
    box-shadow: 0 4px 10px rgba(124, 58, 237, 0.3);
    transition: transform 0.2s;
  }
  .overlay button:hover { transform: scale(1.05); }
  .overlay button:active { transform: scale(0.95); }

  footer {
    margin-top: 20px;
    font-size: 13px;
    text-align: center;
    color: var(--muted);
    font-weight: 500;
    line-height: 1.5;
  }
</style>
</head>
<body>
<!-- Decorative Blobs -->
<div class="blob blob-1"></div>
<div class="blob blob-2"></div>

<div class="wrap">
  <header>
    <h1>🧪 Science Sort <span style="font-size:14px; margin-left:4px; font-weight:600;">(แยกประเภทวิทย์)</span></h1>
    <div class="stats">
      <div class="stat-box"><div class="label">คะแนน</div><div class="value" id="score">0</div></div>
      <div class="stat-box"><div class="label">สูงสุด</div><div class="value" id="best">0</div></div>
    </div>
  </header>

  <div class="subrow">

    <button id="newGame">เริ่มเกมใหม่</button>
  </div>

  <div class="lane" id="lane">
    <div class="overlay" id="overlay">
      <div class="msg" id="overlayMsg">จบเกม</div>
      <div class="sub" id="overlaySub"></div>
      <button id="tryAgain">เล่นอีกครั้ง</button>
    </div>
  </div>

  <div class="buttons">
    <button class="cat-btn physics" data-cat="ฟิสิกส์">⚛️ ฟิสิกส์</button>
    <button class="cat-btn chemistry" data-cat="เคมี">🧫 เคมี</button>

    <button class="cat-btn earth" data-cat="โลกและอวกาศ">🌍 โลกและอวกาศ</button>
  </div>

  <footer>แยกข้อเท็จจริงที่ตกลงมาใส่หมวดหมู่ให้ถูกต้องก่อนจะตกถึงพื้น ทำคะแนนทวีคูณเมื่อตอบถูกติดต่อกัน!</footer>
</div>

    { text: "ฤดูกาลเกิดจากการที่แกนโลกเอียง", cat: "โลกและอวกาศ" },
    { text: "หินตะกอนเกิดจากการทับถมและบีบอัดของตะกอน", cat: "โลกและอวกาศ" },
    { text: "ดาวฤกษ์ส่วนใหญ่ประกอบด้วยไฮโดรเจนและฮีเลียม", cat: "โลกและอวกาศ" },
    { text: "เปลือกโลกแตกเป็นแผ่นๆ เรียกว่าแผ่นเปลือกโลก", cat: "โลกและอวกาศ" }
  ];

  const laneEl = document.getElementById('lane');
  const overlayEl = document.getElementById('overlay');
  const overlayMsg = document.getElementById('overlayMsg');
  const overlaySub = document.getElementById('overlaySub');
  const scoreEl = document.getElementById('score');
  const bestEl = document.getElementById('best');
  const levelEl = document.getElementById('level');
  const livesEl = document.getElementById('lives');
  const catButtons = Array.from(document.querySelectorAll('.cat-btn'));

  let score, best, lives, level, streak, correctCount, currentCard, recentIdx, running;

  function init() {
    best = parseInt(localStorage.getItem('scienceSortBest') || '0', 10);
    bestEl.textContent = best;
    recentIdx = [];
    document.getElementById('newGame').addEventListener('click', startGame);
    document.getElementById('tryAgain').addEventListener('click', startGame);
    catButtons.forEach(btn => btn.addEventListener('click', () => handleAnswer(btn.dataset.cat)));
    startGame();
  }

  function startGame() {
    score = 0; lives = 3; level = 1; streak = 0; correctCount = 0; running = true;
    updateHud();
    overlayEl.classList.remove('show');
    setButtonsEnabled(true);
    clearCard();
    spawnCard();
  }

  function updateHud() {
    scoreEl.textContent = score;
    levelEl.textContent = level;
    let hearts = '';
    for (let i = 0; i < 3; i++) hearts += (i < lives) ? '❤️' : '<span class="lost">❤️</span>';
    livesEl.innerHTML = hearts;
    if (score > best) {
      best = score;
      bestEl.textContent = best;
      localStorage.setItem('scienceSortBest', best);
    }
  }

  function fallDuration() {
    const d = 7 - (level - 1) * 0.5;
    return Math.max(d, 2.5);
  }

  function pickFact() {
    let idx;
    do {
      idx = Math.floor(Math.random() * FACTS.length);
    } while (recentIdx.includes(idx) && recentIdx.length < FACTS.length - 1);
    recentIdx.push(idx);
    if (recentIdx.length > 8) recentIdx.shift();
    return FACTS[idx];
  }

  function clearCard() {
    const existing = laneEl.querySelectorAll('.card');
    existing.forEach(el => el.remove());
  }

  function spawnCard() {
    if (!running) return;
    const fact = pickFact();
    const card = document.createElement('div');
    card.className = 'card';
    card.textContent = fact.text;
    laneEl.appendChild(card);

    // force reflow so transition applies
    card.getBoundingClientRect();

    const duration = fallDuration();
    const laneHeight = laneEl.clientHeight;
    const cardHeight = card.offsetHeight;
    
    // Add transition after popIn animation finishes
    setTimeout(() => {
        if(!currentCard || currentCard.answered) return;
        card.style.transition = `top ${duration}s linear`;
        card.style.top = (laneHeight - cardHeight - 8) + 'px';
    }, 50);

    currentCard = { el: card, cat: fact.cat, answered: false };

    card.addEventListener('transitionend', onMiss);
    setButtonsEnabled(true);
  }

  function onMiss(e) {
    if (e.propertyName !== 'top') return;
    if (!currentCard || currentCard.answered) return;
    currentCard.answered = true;
    streak = 0;
    laneEl.classList.add('shake');
    setTimeout(() => laneEl.classList.remove('shake'), 400);
    loseLife();
  }

  function handleAnswer(chosenCat) {
    if (!running || !currentCard || currentCard.answered) return;
    currentCard.answered = true;
    setButtonsEnabled(false);

    const card = currentCard.el;
    
    // freeze in place properly using getComputedStyle
    const computedStyle = window.getComputedStyle(card);
    const currentTop = computedStyle.getPropertyValue('top');
    card.style.transition = 'none';
    card.style.top = currentTop;

    const isCorrect = chosenCat === currentCard.cat;
    card.classList.add(isCorrect ? 'correct' : 'wrong');

    if (isCorrect) {
      card.classList.add('correct-anim');
      streak += 1;
      correctCount += 1;
      
      const bonus = 10 + Math.min(streak - 1, 5) * 5;
      score += bonus;
      
      // Floating score animation
      const floatScore = document.createElement('div');
      floatScore.className = 'floating-score';
      floatScore.style.left = '50%';
      floatScore.style.top = currentTop;
      floatScore.innerHTML = `+${bonus}` + (streak >= 3 ? ` <span style="font-size:14px;color:#f59e0b;">(คอมโบ ${streak}x!)</span>` : '');
      laneEl.appendChild(floatScore);
      setTimeout(() => floatScore.remove(), 800);

      updateHud();
      if (correctCount % 8 === 0) level += 1;
      setTimeout(() => {
        if(card.parentNode === laneEl) laneEl.removeChild(card);
        updateHud();
        if (running) spawnCard();
      }, 600);
    } else {
      streak = 0;
      laneEl.classList.add('shake');
      setTimeout(() => {
        laneEl.classList.remove('shake');
        if(card.parentNode === laneEl) laneEl.removeChild(card);
        loseLife();
      }, 500);
    }
  }

  function loseLife() {
    lives -= 1;
    updateHud();
    if (lives <= 0) {
      endGame();
    } else {
      setTimeout(() => { if (running) spawnCard(); }, 300);
    }
  }

  function setButtonsEnabled(enabled) {
    catButtons.forEach(b => b.disabled = !enabled);
  }

  function endGame() {
    running = false;
    setButtonsEnabled(false);
    overlayMsg.textContent = 'จบเกม';
    overlaySub.textContent = `คะแนนของคุณ: ${score} · สูงสุด: ${best}`;
    overlayEl.classList.add('show');
  }

  init();
})();
</script>
</body>
</html>
